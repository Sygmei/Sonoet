name: sonoet
description: Training app for musicians to practice reading and playing notes.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  http: ^1.2.2
  pitch_detector_dart: ^0.0.7
  record: ^6.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/exercises/

flutter_launcher_icons:
  image_path: icon.png
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: icon.png
    background_color: "#ffffff"
    theme_color: "#0E7C86"
  windows:
    generate: true
    image_path: icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: icon.png
