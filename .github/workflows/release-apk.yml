name: Build release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release asset
        run: |
          mkdir -p release
          TAG_NAME="${{ github.event.release.tag_name }}"
          SAFE_TAG_NAME="${TAG_NAME//\//-}"
          APK_PATH="release/Sonoet-${SAFE_TAG_NAME}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$APK_PATH"
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "APK_ARTIFACT_NAME=Sonoet-${SAFE_TAG_NAME}-apk" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: ${{ env.APK_PATH }}

      - name: Attach APK to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$APK_PATH" --clobber
